AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: HubSpot webhooks via SQS to NetSuite (SAM)

Globals:
  Function:
    Runtime: python3.14
    Architectures:
      - x86_64

Parameters:
  SecretName:
    Type: String
    Description: >-
      AWS Secrets Manager secret id (name or ARN) holding the account credentials.
      Expected JSON keys: hubspot_api_key, netsuite_client_id, netsuite_cert_id, netsuite_cert_string.
      The processor reads HubSpot and NetSuite credentials from this secret at runtime
      (ACCOUNT_SECRET_NAME).

  HubSpotDealStageCreateId:
    Type: String
    Default: "1233582149"
    Description: HubSpot deal stage internal ID(s) that may CREATE a NetSuite invoice. Comma-separated list allowed.

  HubSpotDealStageUpdateId:
    Type: String
    Default: ""
    Description: HubSpot deal stage internal ID(s) that may UPDATE an existing NetSuite invoice only (no create). Comma-separated list allowed.

  HubSpotObjectTypeVenue:
    Type: String
    Default: "2-47163024"
    Description: HubSpot custom object type ID for venues (webhook objectTypeId).

  HubSpotObjectTypePayment:
    Type: String
    Default: "0-101"
    Description: HubSpot commerce payment object type ID (webhook objectTypeId).

  HubSpotObjectTypeLineItem:
    Type: String
    Default: "0-8"
    Description: HubSpot line item object type ID for webhooks (objectTypeId).

  DealVenueNameProperty:
    Type: String
    Default: "venue_name_"
    Description: HubSpot deal property internal name used to resolve venue name for invoice sync.

  HubSpotVenueNameSearchProperties:
    Type: String
    Default: "name,venue_name"
    Description: Venue custom-object property internal names for CRM search filters (comma-separated).

  WebhookObjectIdFilterEnabled:
    Type: String
    Default: "false"
    Description: When true, process only webhook events with objectId included in WebhookObjectIdFilterValue (comma-separated list supported).

  WebhookObjectIdFilterValue:
    Type: String
    Default: "59370061459"
    Description: HubSpot objectId allowlist used when webhook objectId filter is enabled (comma-separated).

  NetSuiteAccountId:
    Type: String

  NetSuiteSubsidiaryId:
    Type: String

  ProcessorMaxConcurrency:
    Type: Number
    Default: 2
    MinValue: 2
    MaxValue: 1000
    Description: Maximum concurrent ProcessorFunction invocations from SQS (caps shared NetSuite load).

  ApiCallDelaySeconds:
    Type: String
    Default: "0"
    Description: Padding (seconds) between HubSpot/NetSuite API calls in the processor; set "0" to disable.

  HubSpotSignatureVerificationEnabled:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      When "true", the webhook verifies HubSpot v3 signatures and rejects unsigned/stale
      requests. Requires the "hubspot_client_secret" key in the account's Secrets Manager
      secret. Keep "false" until that secret key is provisioned.

Conditions:
  SignatureVerificationOn: !Equals [!Ref HubSpotSignatureVerificationEnabled, "true"]

Resources:

  # ---------------------------
  # SQS queues
  # ---------------------------
  HubSpotWebhookDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  HubSpotWebhookQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 250
      ReceiveMessageWaitTimeSeconds: 0
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt HubSpotWebhookDLQ.Arn
        maxReceiveCount: 5

  # Alarm when any message lands in the DLQ (failed after maxReceiveCount retries).
  HubSpotWebhookDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-webhook-dlq-not-empty'
      AlarmDescription: One or more HubSpot webhook messages have landed in the DLQ.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt HubSpotWebhookDLQ.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # ---------------------------
  # Per-deal sync lock (DynamoDB)
  # ---------------------------
  # Serializes processing per parent deal so concurrent deal/line-item/payment events
  # never reconcile the same invoice at the same time. TTL releases a stale lock if a
  # Lambda dies mid-process. Used by the processor starting in Phase 2.
  SyncLockTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: deal_id
          AttributeType: S
      KeySchema:
        - AttributeName: deal_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # ---------------------------
  # Lambda layer (Python dependencies)
  # ---------------------------
  DependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Metadata:
      BuildMethod: python3.14
      BuildArchitecture: x86_64
    Properties:
      LayerName: netsuite-dependencies
      Description: Python dependencies for NetSuite integration
      ContentUri: lambda_layers/netsuite_dependencies/
      CompatibleRuntimes:
        - python3.14

  # ---------------------------
  # WEBHOOK FUNCTION
  # ---------------------------
  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-webhook'
      Description: Receives HubSpot webhooks and enqueues payloads to SQS
      CodeUri: lambda_functions/hubspot_webhook/
      Handler: lambda_function.lambda_handler
      Timeout: 60
      MemorySize: 256
      Layers:
        - !Ref DependenciesLayer
      Environment:
        Variables:
          SQS_QUEUE_URL: !Ref HubSpotWebhookQueue
          HUBSPOT_SIGNATURE_VERIFICATION_ENABLED: !Ref HubSpotSignatureVerificationEnabled
          # Resolved from Secrets Manager only when verification is on, so deploys succeed
          # before the "hubspot_client_secret" key exists in the secret.
          HUBSPOT_CLIENT_SECRET: !If
            - SignatureVerificationOn
            - !Sub "{{resolve:secretsmanager:${SecretName}:SecretString:hubspot_client_secret}}"
            - !Ref "AWS::NoValue"
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt HubSpotWebhookQueue.QueueName
      Events:
        HubSpotWebhook:
          Type: HttpApi
          Properties:
            Path: /hubspot/webhook
            Method: POST

  # ---------------------------
  # PROCESSOR FUNCTION
  # ---------------------------
  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-processor'
      Description: Consumes SQS messages and syncs HubSpot data to NetSuite
      CodeUri: lambda_functions/hubspot_processor/
      Handler: sqs_processor.lambda_handler
      Timeout: 200
      MemorySize: 1024
      Layers:
        - !Ref DependenciesLayer
      Environment:
        Variables:
          HUBSPOT_DEAL_STAGE_CREATE_ID: !Ref HubSpotDealStageCreateId
          HUBSPOT_DEAL_STAGE_UPDATE_ID: !Ref HubSpotDealStageUpdateId
          HUBSPOT_OBJECT_TYPE_VENUE: !Ref HubSpotObjectTypeVenue
          HUBSPOT_OBJECT_TYPE_PAYMENT: !Ref HubSpotObjectTypePayment
          HUBSPOT_OBJECT_TYPE_LINE_ITEM: !Ref HubSpotObjectTypeLineItem
          DEAL_VENUE_NAME_PROPERTY: !Ref DealVenueNameProperty
          HUBSPOT_VENUE_NAME_SEARCH_PROPERTIES: !Ref HubSpotVenueNameSearchProperties
          WEBHOOK_OBJECT_ID_FILTER_ENABLED: !Ref WebhookObjectIdFilterEnabled
          WEBHOOK_OBJECT_ID_FILTER_VALUE: !Ref WebhookObjectIdFilterValue
          NETSUITE_ACCOUNT_ID: !Ref NetSuiteAccountId
          NETSUITE_SUBSIDIARY_ID: !Ref NetSuiteSubsidiaryId
          ACCOUNT_SECRET_NAME: !Ref SecretName
          SYNC_LOCK_TABLE: !Ref SyncLockTable
          API_CALL_DELAY_SECONDS: !Ref ApiCallDelaySeconds
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SyncLockTable
        - Statement:
            - Sid: ReadAccountSecret
              Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}*'
      Events:
        Queue:
          Type: SQS
          Properties:
            Queue: !GetAtt HubSpotWebhookQueue.Arn
            BatchSize: 1
            MaximumBatchingWindowInSeconds: 0
            ScalingConfig:
              MaximumConcurrency: !Ref ProcessorMaxConcurrency
            FunctionResponseTypes:
              - ReportBatchItemFailures

Outputs:
  WebhookUrl:
    Description: HTTPS endpoint for HubSpot (POST)
    Value: !Sub 'https://${ServerlessHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/hubspot/webhook'

  WebhookQueueUrl:
    Value: !Ref HubSpotWebhookQueue

  WebhookFunctionArn:
    Value: !GetAtt WebhookFunction.Arn

  ProcessorFunctionArn:
    Value: !GetAtt ProcessorFunction.Arn